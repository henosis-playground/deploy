name: Render environments

on:
  push:
    branches: [main]
    paths:
      - "*.toml"

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      manifests: ${{ steps.changed.outputs.manifests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changed
        shell: bash
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD -- '*.toml')
          else
            files=$(git ls-files '*.toml')
          fi

          files=$(printf '%s\n' "${files}" | while IFS= read -r file; do
            if [ -f "${file}" ] && grep -Eq '^\[environment\]' "${file}"; then
              printf '%s\n' "${file}"
            fi
          done)

          if printf '%s\n' "${files}" | grep -Fxq 'dev.toml'; then
            followers=$(grep -lE 'follow[[:space:]]*=[[:space:]]*"dev"' -- *.toml 2>/dev/null || true)
            files=$(printf '%s\n%s\n' "${files}" "${followers}" | awk 'NF && !seen[$0]++')
          fi

          manifests=$(printf '%s\n' "${files}" | tr '\n' ' ')
          echo "manifests=${manifests}" >> "$GITHUB_OUTPUT"

  render:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.manifests != ''
    steps:
      - uses: actions/checkout@v4

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: henosis-playground/platform
          path: _platform
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: _platform/pnpm-lock.yaml

      - name: Install and build platform
        working-directory: _platform
        run: |
          pnpm install
          pnpm --filter @henosis/core build
          pnpm --filter @henosis/platform-mock build
          pnpm --filter @henosis/renderer build

      - name: Render changed manifests
        shell: bash
        run: |
          for manifest in ${{ needs.detect-changes.outputs.manifests }}; do
            echo "Rendering ${manifest}"
            pnpm --dir _platform --filter @henosis/renderer exec tsx src/render.ts "${GITHUB_WORKSPACE}/${manifest}" \
              --output-dir "${GITHUB_WORKSPACE}/rendered/${manifest%.toml}"
          done

      - name: Push rendered output to env branches
        shell: bash
        run: |
          git config user.email "henosis-render@github-actions"
          git config user.name "Henosis Renderer"
          git fetch origin "+refs/heads/${GITHUB_REF_NAME}:refs/remotes/origin/${GITHUB_REF_NAME}" --depth=1
          latest_main="refs/remotes/origin/${GITHUB_REF_NAME}"

          for manifest in ${{ needs.detect-changes.outputs.manifests }}; do
            env_id="${manifest%.toml}"
            branch="env/${env_id}"
            worktree="/tmp/henosis-env-${env_id}"

            if ! git cat-file -e "${latest_main}:${manifest}" 2>/dev/null; then
              echo "Skipping ${manifest}; it no longer exists on origin/${GITHUB_REF_NAME}"
              continue
            fi

            rendered_blob="$(git rev-parse "${GITHUB_SHA}:${manifest}")"
            latest_blob="$(git rev-parse "${latest_main}:${manifest}")"
            if [ "${rendered_blob}" != "${latest_blob}" ]; then
              echo "Skipping ${manifest}; a newer manifest revision exists on origin/${GITHUB_REF_NAME}"
              continue
            fi

            rm -rf "${worktree}"
            git fetch origin "+refs/heads/${branch}:refs/remotes/origin/${branch}" || true
            if git rev-parse --verify "origin/${branch}" >/dev/null 2>&1; then
              git worktree add "${worktree}" -B "${branch}" "origin/${branch}"
            else
              git worktree add "${worktree}" --detach
              git -C "${worktree}" checkout --orphan "${branch}"
            fi

            find "${worktree}" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cp -r "rendered/${env_id}/." "${worktree}/"

            git -C "${worktree}" add .
            git -C "${worktree}" commit -m "Render ${env_id} from ${GITHUB_SHA::8}" || true
            git -C "${worktree}" push origin "HEAD:${branch}"
            git worktree remove "${worktree}" --force
          done
